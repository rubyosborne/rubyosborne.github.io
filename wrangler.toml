# Cloudflare Workers (Git-connected build) config for the static Astro site.
# The project's deploy command is `npx wrangler deploy`; wrangler runs the
# [build] hook first (build the Astro site), then deploys ./dist as static
# assets — no Worker script needed for a purely static site.

name = "rubyosborne"
compatibility_date = "2026-06-29"
main = "./worker.js"

[build]
command = "npm install && npm run build"

[assets]
directory = "./dist"
binding = "ASSETS"
# Run the Worker BEFORE serving these paths, so it can password-gate the deck.
run_worker_first = ["/protected/*"]
